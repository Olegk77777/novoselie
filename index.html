<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Заголовок вкладки подставляется из locales/ru.json при запуске игры -->
  <title>...</title>
  <style>
    /* Убираем отступы браузера, чтобы 3D-сцена занимала весь экран */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #1a1a2e;
    }
    canvas { display: block; }
    /* Нижняя панель предметов */
    #ui-panel {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      background: rgba(20, 20, 40, 0.85);
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      user-select: none;
    }
    .ui-slot {
      width: 56px;
      height: 56px;
      font-size: 30px;
      line-height: 1;
      background: #2d2d44;
      border: 2px solid #6a6a8a;
      border-radius: 6px;
      cursor: pointer;
      color: inherit;
    }
    .ui-slot.empty {
      opacity: 0.35;
      border-style: dashed;
      cursor: default;
    }
    .ui-slot-label {
      font-size: 11px;
      text-align: center;
      margin-top: 4px;
    }
    .ui-btn {
      padding: 12px 16px;
      background: #2d2d44;
      border: 1px solid #6a6a8a;
      border-radius: 6px;
      color: inherit;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }
    /* Крупная подсказка-тост сверху экрана */
    #ui-hint-toast {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid #6a6a8a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      font-size: 15px;
      text-align: center;
      max-width: 90vw;
      pointer-events: none; /* не перехватывает клики по сцене */
    }
    #ui-hint-toast.flash {
      animation: hint-flash 0.5s ease;
    }
    @keyframes hint-flash {
      0% {
        transform: translateX(-50%) scale(1.12);
        background: rgba(90, 90, 140, 0.95);
      }
      100% {
        transform: translateX(-50%) scale(1);
      }
    }
    /* Плашка с ошибкой — показывается, только если игра не смогла запуститься */
    #error-overlay {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 24px;
      background: #2d2d44;
      color: #f0e6d2;
      font-family: monospace;
      border: 2px solid #f0e6d2;
    }
  </style>
  <!-- importmap говорит браузеру, где брать Three.js (с CDN, версия зафиксирована) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="error-overlay"></div>
  <!-- ?v=N — версия для сброса кэша. При изменении кода бампать число (см. CLAUDE.md) -->
  <script type="module" src="src/game.js?v=2"></script>
</body>
</html>
