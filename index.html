<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Заголовок вкладки подставляется из locales/ru.json при запуске игры -->
  <title>...</title>
  <style>
    /* Убираем отступы браузера, чтобы 3D-сцена занимала весь экран */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #1a1a2e;
    }
    canvas { display: block; }
    /* Весь нижний интерфейс — колонка по центру: кнопки действий, кнопка
       сворачивания, панель предметов. Так кнопки всегда НАД панелью. */
    #ui-bottom {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      max-width: 96vw;
    }
    /* Панель предметов (при нехватке места прокручивается по горизонтали) */
    #ui-panel {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      max-width: 100%;
      overflow-x: auto;
      background: rgba(20, 20, 40, 0.85);
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      user-select: none;
    }
    #ui-panel.collapsed {
      display: none;
    }
    /* Кнопка свернуть/развернуть панель */
    #ui-toggle {
      padding: 5px 16px;
      background: rgba(20, 20, 40, 0.85);
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }
    .ui-slot-wrap {
      flex: 0 0 auto;
      width: 64px;
    }
    .ui-slot {
      position: relative;
      width: 56px;
      height: 56px;
      margin: 0 auto;
      display: block;
      background: #2d2d44;
      border: 2px solid #6a6a8a;
      border-radius: 6px;
      cursor: pointer;
      color: inherit;
      padding: 2px;
    }
    .ui-slot.empty {
      opacity: 0.35;
      border-style: dashed;
      cursor: default;
    }
    .ui-slot.disabled {
      opacity: 0.45;
      border-style: dotted;
    }
    .ui-slot-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none; /* клики ловит сама кнопка-ячейка */
    }
    .ui-slot-badge {
      position: absolute;
      top: 1px;
      right: 1px;
      font-size: 11px;
      padding: 0 3px;
      background: rgba(10, 10, 20, 0.75);
      border-radius: 4px;
      pointer-events: none;
    }
    .ui-slot-label {
      font-size: 10px;
      text-align: center;
      margin-top: 3px;
      overflow-wrap: break-word;
    }
    /* Кнопки действий — отдельной строкой над панелью (в потоке #ui-bottom) */
    #ui-actions {
      display: flex;
      gap: 10px;
    }
    /* display: flex перебивает атрибут hidden — возвращаем скрытие явно */
    #ui-actions[hidden] {
      display: none;
    }
    .ui-btn {
      padding: 12px 16px;
      background: #2d2d44;
      border: 1px solid #6a6a8a;
      border-radius: 6px;
      color: inherit;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }
    /* Шкала уюта слева сверху */
    #ui-comfort {
      position: fixed;
      top: 14px;
      left: 14px;
      padding: 8px 12px;
      background: rgba(20, 20, 40, 0.85);
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      font-size: 13px;
      user-select: none;
      pointer-events: none;
    }
    .ui-comfort-value {
      opacity: 0.85;
    }
    .ui-comfort-bar {
      width: 140px;
      height: 10px;
      margin-top: 6px;
      background: #2d2d44;
      border: 1px solid #6a6a8a;
      border-radius: 5px;
      overflow: hidden;
    }
    .ui-comfort-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c97f3d, #e8b96a);
      transition: width 0.4s ease; /* полоска растёт плавно */
    }
    /* Крупная подсказка-тост сверху экрана */
    #ui-hint-toast {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid #6a6a8a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      font-size: 15px;
      text-align: center;
      max-width: 90vw;
      pointer-events: none; /* не перехватывает клики по сцене */
    }
    #ui-hint-toast.flash {
      animation: hint-flash 0.5s ease;
    }
    /* На неширких экранах тост опускается ниже шкалы уюта, чтобы не перекрывались */
    @media (max-width: 900px) {
      #ui-hint-toast {
        top: 78px;
      }
    }
    @keyframes hint-flash {
      0% {
        transform: translateX(-50%) scale(1.12);
        background: rgba(90, 90, 140, 0.95);
      }
      100% {
        transform: translateX(-50%) scale(1);
      }
    }
    /* Плашка с ошибкой — показывается, только если игра не смогла запуститься */
    #error-overlay {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 24px;
      background: #2d2d44;
      color: #f0e6d2;
      font-family: monospace;
      border: 2px solid #f0e6d2;
    }
  </style>
  <!-- importmap говорит браузеру, где брать Three.js (с CDN, версия зафиксирована) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="error-overlay"></div>
  <!-- ?v=N — версия для сброса кэша. При изменении кода бампать число (см. CLAUDE.md) -->
  <script type="module" src="src/game.js?v=14"></script>
</body>
</html>
