<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Заголовок вкладки подставляется из locales/ru.json при запуске игры -->
  <title>...</title>
  <style>
    /* Убираем отступы браузера, чтобы 3D-сцена занимала весь экран */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #1a1a2e;
    }
    canvas { display: block; }
    /* Кнопки действий и сворачивания — в правом верхнем углу (там пусто,
       не перекрывают низ комнаты, куда ставятся предметы). */
    #ui-top {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      z-index: 5;
    }
    /* Низ — только панель предметов, по центру. Кнопка «Свернуть» прижата влево
       (над первой иконкой), чтобы не мешать обзору центра комнаты. */
    #ui-bottom {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      max-width: 96vw;
    }
    /* Обёртка панели — для стрелок-индикаторов прокрутки по краям */
    #ui-panel-wrap {
      position: relative;
      max-width: 100%;
    }
    /* Панель предметов (при нехватке места прокручивается по горизонтали) */
    #ui-panel {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      max-width: 100%;
      overflow-x: auto;
      background: rgba(20, 20, 40, 0.85);
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      user-select: none;
      scrollbar-width: auto;
      scrollbar-color: #c9b88f rgba(0, 0, 0, 0.25);
    }
    #ui-panel.collapsed {
      display: none;
    }
    /* Заметная полоса прокрутки (вместо тёмной, сливающейся с фоном) */
    #ui-panel::-webkit-scrollbar {
      height: 11px;
    }
    #ui-panel::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 6px;
    }
    #ui-panel::-webkit-scrollbar-thumb {
      background: #c9b88f;
      border-radius: 6px;
      border: 1px solid #8a7a5a;
    }
    /* Стрелки-индикаторы прокрутки по краям панели */
    .ui-scroll-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      line-height: 1;
      color: #1a1a2e;
      background: rgba(240, 230, 210, 0.94);
      border: 1px solid #b9a98a;
      border-radius: 8px;
      cursor: pointer;
      z-index: 3;
    }
    .ui-scroll-left {
      left: 6px;
    }
    .ui-scroll-right {
      right: 6px;
    }
    .ui-scroll-arrow[hidden] {
      display: none;
    }
    /* Кнопка свернуть/развернуть панель — выровнена с первой иконкой панели */
    #ui-toggle {
      margin-left: 12px;
      padding: 8px 20px;
      background: #f0e6d2;
      border: 1px solid #b9a98a;
      border-radius: 8px;
      color: #1a1a2e;
      font-family: monospace;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .ui-slot-wrap {
      flex: 0 0 auto;
      width: 88px;
    }
    .ui-slot {
      position: relative;
      width: 76px;
      height: 76px;
      margin: 0 auto;
      display: block;
      background: #2d2d44;
      border: 2px solid #6a6a8a;
      border-radius: 6px;
      cursor: pointer;
      color: inherit;
      padding: 3px;
    }
    .ui-slot.empty {
      opacity: 0.35;
      border-style: dashed;
      cursor: default;
    }
    .ui-slot.disabled {
      opacity: 0.45;
      border-style: dotted;
    }
    .ui-slot-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none; /* клики ловит сама кнопка-ячейка */
    }
    .ui-slot-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 14px;
      font-weight: bold;
      padding: 1px 5px;
      background: rgba(10, 10, 20, 0.8);
      border-radius: 4px;
      pointer-events: none;
    }
    .ui-slot-label {
      font-size: 13px;
      text-align: center;
      margin-top: 4px;
      overflow-wrap: break-word;
    }
    /* Кнопки действий — вертикальным столбиком в правом верхнем углу */
    #ui-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    /* display: flex перебивает атрибут hidden — возвращаем скрытие явно */
    #ui-actions[hidden] {
      display: none;
    }
    .ui-btn {
      padding: 13px 20px;
      background: #f0e6d2;
      border: 1px solid #b9a98a;
      border-radius: 6px;
      color: #1a1a2e;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    /* Левая колонка: шкала уюта + журнал заданий */
    #ui-left {
      position: fixed;
      top: 14px;
      left: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 4;
      pointer-events: none;
    }
    #ui-comfort {
      padding: 8px 12px;
      background: rgba(20, 20, 40, 0.85);
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      font-size: 13px;
      user-select: none;
    }
    /* Журнал заданий */
    #ui-quests {
      padding: 8px 12px;
      background: rgba(20, 20, 40, 0.85);
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      font-size: 12px;
      max-width: 230px;
      user-select: none;
    }
    .ui-quests-title {
      font-weight: bold;
      font-size: 13px;
    }
    .ui-quest-line {
      margin-top: 5px;
      line-height: 1.4;
      color: #e8d9b0;
    }
    .ui-comfort-value {
      opacity: 0.85;
    }
    .ui-comfort-bar {
      width: 140px;
      height: 10px;
      margin-top: 6px;
      background: #2d2d44;
      border: 1px solid #6a6a8a;
      border-radius: 5px;
      overflow: hidden;
    }
    .ui-comfort-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c97f3d, #e8b96a);
      transition: width 0.4s ease; /* полоска растёт плавно */
    }
    /* Список активных бонусов за сочетания — под полоской уюта */
    .ui-combos {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.6;
      color: #e8d9b0;
      max-width: 210px;
    }
    /* Крупная подсказка-тост сверху экрана */
    #ui-hint-toast {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid #6a6a8a;
      border-radius: 8px;
      color: #f0e6d2;
      font-family: monospace;
      font-size: 15px;
      text-align: center;
      max-width: 90vw;
      pointer-events: none; /* не перехватывает клики по сцене */
    }
    #ui-hint-toast.flash {
      animation: hint-flash 0.5s ease;
    }
    /* На неширких экранах тост опускается ниже шкалы уюта, чтобы не перекрывались */
    @media (max-width: 900px) {
      #ui-hint-toast {
        top: 78px;
      }
    }
    @keyframes hint-flash {
      0% {
        transform: translateX(-50%) scale(1.12);
        background: rgba(90, 90, 140, 0.95);
      }
      100% {
        transform: translateX(-50%) scale(1);
      }
    }
    /* Модальное уведомление — крупно по центру, для важных событий (квесты).
       Появляется, игрок читает и жмёт ОК, затем сообщение уходит в боковую панель. */
    #ui-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(12, 10, 22, 0.74);
    }
    #ui-modal[hidden] {
      display: none;
    }
    .ui-modal-card {
      background: rgba(34, 32, 56, 0.98);
      border: 2px solid #c9b88f;
      border-radius: 14px;
      padding: 30px 38px;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 14px 50px rgba(0, 0, 0, 0.6);
      font-family: monospace;
    }
    .ui-modal-kicker {
      color: #e8b96a;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .ui-modal-text {
      color: #f0e6d2;
      font-size: 25px;
      line-height: 1.5;
      margin-bottom: 24px;
      white-space: pre-line; /* переносы \n в тексте (приветствие — строфами) */
    }
    .ui-modal-ok {
      padding: 12px 50px;
      background: linear-gradient(180deg, #e8b96a, #c97f3d);
      border: 1px solid #b9a98a;
      border-radius: 9px;
      color: #2a1e10;
      font-family: inherit;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    .ui-modal-card.pop {
      animation: modal-pop 0.32s ease;
    }
    @keyframes modal-pop {
      0% { transform: scale(0.82); opacity: 0; }
      60% { transform: scale(1.04); }
      100% { transform: scale(1); opacity: 1; }
    }
    @media (max-width: 900px) {
      .ui-modal-text { font-size: 21px; }
      .ui-modal-card { padding: 24px 26px; max-width: 88vw; }
    }
    /* Плашка с ошибкой — показывается, только если игра не смогла запуститься */
    #error-overlay {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 24px;
      background: #2d2d44;
      color: #f0e6d2;
      font-family: monospace;
      border: 2px solid #f0e6d2;
    }
  </style>
  <!-- importmap говорит браузеру, где брать Three.js (с CDN, версия зафиксирована) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="error-overlay"></div>
  <!-- ?v=N — версия для сброса кэша. При изменении кода бампать число (см. CLAUDE.md) -->
  <script type="module" src="src/game.js?v=35"></script>
</body>
</html>
